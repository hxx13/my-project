# 本机（跑 Spring 的机器）运行: frpc.exe -c frpc.ini
# 下载与 frps 相同大版本: https://github.com/fatedier/frp/releases
#
# 【与 frpc.toml 二选一】
# - 新教程「公网 8080 直连」：请用 frpc.toml（remotePort=8080），云上 frps 须 proxy_bind_addr=0.0.0.0。
# - 本文件为旧版：remote 18080 且云上 frps 通常 proxy_bind_addr=127.0.0.1，由 Nginx 443 反代到 127.0.0.1:18080。

[common]
server_addr = 47.101.61.184
server_port = 7000
token = change_me_to_a_long_random_secret

# 云上 frps 仅本机监听时：Nginx upstream 指向 127.0.0.1:18080
[spring-boot]
type = tcp
local_ip = 127.0.0.1
local_port = 8080
remote_port = 18080
