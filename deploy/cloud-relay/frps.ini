# 阿里云 ECS 上运行: ./frps -c frps.ini
# 下载: https://github.com/fatedier/frp/releases

[common]
bind_addr = 0.0.0.0
bind_port = 7000

# 与 frpc.ini / frpc.toml 中 token、auth.token 必须一致（请改成强随机串）
token = change_me_to_a_long_random_secret

# ---------------------------------------------------------------------------
# 公网直连 Spring（与 frpc.toml 中 remotePort=8080 配套）：
#   必须为 0.0.0.0，否则 frps 只在 127.0.0.1 上监听代理端口，
#   外网无法访问 47.101.61.184:8080，云函数 / 浏览器也打不通。
#
# 旧方案（仅本机 + remote 18080 + Nginx 443 反代到 127.0.0.1:18080）：
#   若仍用 frpc.ini 的 remote_port=18080，请改回 proxy_bind_addr = 127.0.0.1
#   且勿与下面公网 8080 方案同时占用两套端口。
# ---------------------------------------------------------------------------
proxy_bind_addr = 0.0.0.0

# 可选：管理面板（不需要可整段删除）
# dashboard_port = 7500
# dashboard_user = admin
# dashboard_pwd = admin
