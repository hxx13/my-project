# Windows: frpc.exe -c frpc.toml
# 须保存为 UTF-8 无 BOM；若首字节为 EF BB BF，frp 0.56 可能报错:
# json: cannot unmarshal string into Go value of type v1.ClientConfig
# token 须与云上 frps 的 auth.token 一致。
# 若报「token in login doesn't match」：说明下面 auth.token 与 ECS 上 frps 实际配置不一致，
# 请 SSH 到服务器查看 frps 所用文件中的 auth.token（INI 则为 [common] 下 token=），复制到此处。
#
# ========== 须在「阿里云安全组 + 宝塔防火墙」放行的端口 ==========
# 7000   frpc→frps（若 frps 只监听内网可不对公网放行；公网连 frps 则需放行）
# 8080   Spring HTTP（本配置 springboot-proxy）
# 9092   Socket.IO（socketio-proxy）
# 21115  RustDesk hbbs NAT 检测（TCP）
# 21116  RustDesk hbbs ID / 打洞（TCP + UDP 都要放行）
# 21117  RustDesk hbbr 中继（TCP）
# 21118  RustDesk Web 客户端 HTTP（可选，未部署可不监听）
# 21119  RustDesk Web 客户端 HTTPS（可选）
# 若本机未运行 hbbs/hbbr，可删掉下方 rustdesk-* 段，避免无效映射。
# ================================================================
serverAddr = "47.101.61.184"
serverPort = 7000

[[proxies]]
name = "springboot-proxy"
type = "tcp"
localIP = "127.0.0.1"
localPort = 8080
remotePort = 8080

[[proxies]]
name = "socketio-proxy"
type = "tcp"
localIP = "127.0.0.1"
localPort = 9092
remotePort = 9092

# RustDesk 自建服务器：本机安装 hbbs/hbbr 且监听上述端口时使用。
# 若仅用 RustDesk 官方中转、不在本机跑服务，可删除从 rustdesk-hbbs-nat 到 rustdesk-web-https 的全部段落。
[[proxies]]
name = "rustdesk-hbbs-nat"
type = "tcp"
localIP = "127.0.0.1"
localPort = 21115
remotePort = 21115

[[proxies]]
name = "rustdesk-hbbs-id-tcp"
type = "tcp"
localIP = "127.0.0.1"
localPort = 21116
remotePort = 21116

[[proxies]]
name = "rustdesk-hbbs-id-udp"
type = "udp"
localIP = "127.0.0.1"
localPort = 21116
remotePort = 21116

[[proxies]]
name = "rustdesk-hbbr-relay"
type = "tcp"
localIP = "127.0.0.1"
localPort = 21117
remotePort = 21117

[[proxies]]
name = "rustdesk-web-http"
type = "tcp"
localIP = "127.0.0.1"
localPort = 21118
remotePort = 21118

[[proxies]]
name = "rustdesk-web-https"
type = "tcp"
localIP = "127.0.0.1"
localPort = 21119
remotePort = 21119
