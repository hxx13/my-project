# Twin System API 设计规范

skill:
  id: "twin-api-designer"
  name: "API 设计"
  version: "1.0.0"

philosophy:
  design_principles:
    - "统一响应：com.example.demo.common.dto.Result<T>"
    - "URL 前缀：/api/...（管理端、小程序共用后端）"
    - "OpenAPI：@Tag、@Operation（springdoc）"
    - "认证：Authorization: Bearer <token>，由 AuthContextService 解析用户"
    - "权限：RoleEnum 等级 + pagepermission 节点；非芋道 @PreAuthorize"
    - "与芋道不同：不使用 CommonResult、不使用 /system/user/create 动词式路径"

response_format:
  class: "com.example.demo.common.dto.Result"
  fields:
    - { name: "code", type: "Integer", note: "200 成功，500 等业务错误" }
    - { name: "success", type: "Boolean" }
    - { name: "message", type: "String" }
    - { name: "data", type: "T" }
  helpers:
    - "Result.success(data)"
    - "Result.success(data, message)"
    - "Result.error(message)  // 等价 fail(500, message)"
    - "Result.fail(code, message)"
  business_exception:
    class: "com.example.demo.common.exception.TwinBusinessException"
    codes: "com.example.demo.common.exception.ErrorCodeConstants"
    handler: "com.example.demo.common.web.GlobalExceptionHandler"

url_conventions:
  patterns:
    - pattern: "/api/auth/*"
      module: "auth"
    - pattern: "/api/admin/*"
      module: "管理端专用"
    - pattern: "/api/v1/telemetry/*"
      module: "telemetry"
    - pattern: "/api/twin/* 或 /api/v1/twin/*"
      module: "twin（以现有 Controller 为准，勿随意改路径）"
  rules:
    - "新增接口优先 REST 语义：GET 查询、POST 创建、PUT/PATCH 更新、DELETE 删除"
    - "破坏性变更需评估 Web frontend 与 aroapp 调用方"

controller_template: |
  @RestController
  @RequestMapping("/api/example")
  @Tag(name = "示例模块")
  public class ExampleController {
      @GetMapping("/items")
      @Operation(summary = "列表")
      public Result<List<ExampleVo>> list(HttpServletRequest request) {
          User user = authContextService.resolveUserFromBearer(request.getHeader("Authorization"));
          if (user == null) return Result.error("未登录");
          // …
          return Result.success(data);
      }
  }

auth:
  service: "com.example.demo.common.service.AuthContextService"
  token_note: "当前为 jwt_mock_token_{userId}，升级 JWT 时保持 Result 契约不变"
  roles: "com.example.demo.common.enums.RoleEnum（STUDENT..PLATFORM_OWNER）"

frontend_contract:
  web: "frontend/src/api/domains/*.api.ts + axios"
  mini: "aroapp/miniprogram/**/utils/*Api.js"
  save_behavior: "单条保存成功后就地合并，禁止整表 load（见 post-save-no-full-refresh.mdc）"
