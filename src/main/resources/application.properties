spring.application.name=demo
# 本地默认 8080；若与其它进程冲突可改端口，并同步 frpc.toml 的 localPort、frontend/vite 代理。
server.port=8080
# 头像代理 query 较长时放宽请求行
server.max-http-request-header-size=65536

server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force-request=true
server.servlet.encoding.force-response=true

# SSE 长连接（GET /api/notifications/stream）：须与 NotificationPushService 中 SseEmitter 超时一致（当前 30min），
# 否则 Spring MVC 异步层会先超时并触发 AsyncRequestTimeoutException（响应已开始写入 event-stream 时出现 response committed）。
spring.mvc.async.request-timeout=30m

spring.servlet.multipart.max-file-size=30MB
spring.servlet.multipart.max-request-size=35MB
#logging.level.org.springframework.web.filter=DEBUG
logging.level.io.netty=ERROR
logging.level.com.corundumstudio.socketio=ERROR
logging.level.org.apache.coyote.http11.Http11Processor=ERROR

# 控制台仅正文：由 logback-spring.xml 强制 pattern=%msg%n（无前缀）。若删除 logback-spring.xml，可改用下面一行。
logging.pattern.console=%msg%n
#logging.pattern.console=%d{HH:mm:ss.SSS} %-5level %36.36logger : %msg%n

spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5

# characterEncoding 须为 Java 合法名 UTF-8；小写 utf-8 易被映射为 MySQL 三字节 utf8，导致中文乱码
spring.datasource.url=jdbc:mysql://localhost:3306/twin_system?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=SuperAdmin@2026
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.connection-init-sql=SET NAMES utf8mb4 COLLATE utf8mb4_unicode_ci

# 默认调度池线程数（门禁/统一调度/大华等 @Scheduled）；与 WinCC 遥测独立池分离，避免大轮询挤占主业务
spring.task.scheduling.pool.size=8

mybatis.mapper-locations=classpath:mapper/**/*.xml
mybatis.configuration.map-underscore-to-camel-case=true
# 与 sys_user.role 存枚举名（如 SUPER_ADMIN）一致，避免默认按 ordinal 映射错误
mybatis.configuration.default-enum-type-handler=org.apache.ibatis.type.EnumTypeHandler

# 启动时在应用内执行 classpath:db/bootstrap-*.sql（与 scripts/login_branding_invite_chat.ddl.sql、admin_file_templates.ddl.sql 同源），
# 无需在库外手工跑 SQL；生产若禁止应用账号 DDL 或已由 DBA 建表，可改为 false。
app.schema.auto-ensure-embedded-core-ddl=true

# MySQL/MariaDB 启动检测：若 sys_user 缺少 mini_preferences_json（小程序个人配置），自动 ALTER 一次。
# 若库账号无 DDL 权限或不由应用改表，改为 false 并由 DBA 执行 src/main/resources/sql/manual_migrate_sys_user_mysql.sql
app.schema.auto-ensure-sys-user-mini-preferences=true
# Windows 下若 JVM 默认非 UTF-8，显式保证 schema/data 脚本按 UTF-8 读入，避免初始化进库的中文已乱码
spring.sql.init.encoding=UTF-8

# 小程序云函数转发（可选）：非空则所有 /api/** 须带请求头 X-Proxy-Secret，与云函数环境变量 PROXY_SHARED_SECRET 一致。留空不校验。
# 云函数侧变量说明：aroapp/cloudfunctions/springProxy/ENV_CONSOLE.txt
app.mp.proxy.secret=

# 转移记录 PDF 导出：含中文，需可嵌入的 CJK 字体。.ttc（如 msyh.ttc）已自动解析；无系统字体时在此指定绝对路径，例如：
# app.pdf.font-path=C:/Windows/Fonts/msyh.ttc
app.pdf.font-path=

# 对外可访问基址（用于生成绝对下载链接），例如 http://192.168.1.10:8080
app.public-base-url=

# 登录页轮播图上传落盘目录（须可写；勿指向 JAR 内部）。默认用户目录下，与 JAR 分离；公开访问路径为 /api/public/login-branding/files/{文件名}
app.login-branding.upload-dir=${user.home}/.twin-system/login-branding-uploads

# 人员头像反代（白名单主机，逗号分隔）；与前端 resolvePersonnelAvatarUrl 域名策略对齐
app.personnel-avatar-proxy.allowed-hosts=aro.shsmu.edu.cn,shsmu.edu.cn
# 路径含 /jtu_files/ 时强制用该主机 HTTPS 拉取（修正库内错误域名/IP，避免证书 CN 不匹配）
app.personnel-avatar-proxy.canonical-file-host=aro.shsmu.edu.cn
# 仅头像出站：证书与域名不一致且无法修正时临时 true（影响 JVM 全局 HTTPS 校验，慎用）
app.personnel-avatar-proxy.insecure-tls=false

# ARO JTU 根路径（新闻代理等）；小程序改走 GET /api/public/aro/news，由服务端带 Token 访问 JTU
app.aro.jtu-api-base-url=https://aro.shsmu.edu.cn/jtu/api

# 门禁规则 -> 大华权限联动调试开关
app.access-rule-dahua-debug=true

# 大华刷卡联动：处理「到期签退/激活超时」的定时节拍（毫秒，默认 5000）
app.dahua-swing.due-process-ms=5000

# ---------- WinCC REST 只读（动物房温湿度等）----------
# 未启用时 GET /api/v1/telemetry/wincc/snapshot 仍可用，返回 winccEnabled=false 与说明文案，不访问 WinCC。
# 说明：浏览器在 WinCC 页控制台能 fetch，是因为「页面与 WinCC 同源」；本后端从 Spring 所在机访问 https://CLIENT-01:8080/...，
# 必须在「运行 Spring 的那台电脑」上能 ping/HTTPS 通主机名；UnknownHostException 表示本机无法解析该名——改用 WinCC 服务器 IP（https://x.x.x.x:8080）、或在 hosts/DNS 中为该机配置别名后再保留 CLIENT-01。
# 调试日志：取消下一行注释可看到 [WinCC遥测] 前缀的拉取与 HTTP 详情（成功为 INFO，堆栈为 DEBUG）。
# logging.level.com.example.demo.modules.telemetry=DEBUG
# 生产环境勿提交弱口令；可用环境变量或本地 application-local.properties 覆盖 app.wincc.password。
# 无法访问 WinCC 时改回 false，避免启动后一直超时。
app.wincc.enabled=true
app.wincc.base-url=https://CLIENT-01:8080
app.wincc.username=admin
app.wincc.password=111111
# WinCC 常用自签 HTTPS；正式受信证书可改为 false
app.wincc.ssl-insecure=true
app.wincc.connect-timeout-ms=8000
# 单次 POST 读超时（毫秒）；分片后每片单独计时。WinCC 偶发慢时仍可能超时，可再加大（如 180000）。
app.wincc.read-timeout-ms=120000
# 每次 /Values 请求 body 中 variableNames 最大条数，过大易 Read timed out，可 80～200 微调
app.wincc.values-chunk-size=150
# 后台刷新内存快照间隔（毫秒）；全量几千点、多分片时 WinCC 一轮很慢，建议 60000～120000，并关闭不参与的分区开关
app.wincc.refresh-interval-ms=60000
# 定时管理 TELEMETRY_WINCC_UI 关闭时，用 refresh-interval-ms 拉 WinCC；开启时本值为调度 tick 粒度（默认 5s 内判断是否到达轮询秒数）
app.wincc.scheduler-tick-ms=5000
# WinCC 遥测定时节拍专用线程池（与 spring.task.scheduling 隔离）；大点数保持 1 即可串行防叠压
app.wincc.scheduler.pool-size=1
app.wincc.scheduler.thread-name-prefix=wincc-telemetry-
# 测点清单：大 CSV 勿放仓库。推荐 database + 后台「WinCC 变量导入」页上传；或 classpath:/file: 外置路径。
# classpath=读 watchlist-csv；database=合并读 MySQL 各文件名分区下已启用的变量。
# 为 true（默认）时，启动阶段执行 classpath:db/telemetry-watchlist-schema.sql（CREATE IF NOT EXISTS），解决表不存在；生产可改为 false 由 DBA 单独建表。
app.wincc.ensure-watchlist-schema=true

# 遥测归档：WinCC 刷新成功后异步写入 telemetry_value_archive；保留天数与定时清理
app.telemetry.archive.enabled=true
app.telemetry.archive.retention-days=30
app.telemetry.archive.purge-cron=0 40 3 * * ?
# database=后台「WinCC 变量」导入 MySQL 的清单（已启用 + 分区参与拉数），与现场配置一致，推荐默认。
# classpath=仅读 watchlist-csv / variable-names，否则退回内置 10 点——不会读你导入到库里的行。
app.wincc.watchlist-source=database
# app.wincc.watchlist-source=classpath
# 仅 watchlist-source 非 database 时生效：为 true 才允许快照刷新走 CSV/内置点名（开发临时用）。用 database 时请保持 false。
app.wincc.allow-non-database-snapshot-pull=false
# watchlist-csv 留空则 classpath 模式不下发大文件（回退内置 10 点）；需要时可改为 file:D:/config/xxx.csv
app.wincc.watchlist-csv=
# 若配置 variable-names，则完全忽略 CSV（适合临时再压几个点）：
# app.wincc.variable-names[0]=A203S_4.房间温度
# app.wincc.variable-names[1]=A203S_4.房间湿度

# ---------- 动物房 Hub（Web 与微信小程序同源：GET /api/v1/telemetry/wincc/animal-room-hub）----------
# 依赖：① 上文 app.wincc.*（内存快照）；② JobSchedulerService 中 TELEMETRY_WINCC_UI 计划行（程序坞轮询开关与间隔）；
# ③ TwinDashboardAggregationService（响应字段 runningStatusRooms 与 GET .../twin/dashboard/wechat-overview 同源）。
# 实现与字段说明见：src/main/java/com/example/demo/modules/telemetry/animalroom/README.md

# ---------- 注册推荐码 / 站内信附件 ----------
# 推荐码哈希用 pepper（生产务必改为随机长串并保密）
app.invite-code-pepper=change-me-in-production
# 站内信附件本地目录（后续可换 OSS 实现）
app.chat.upload-dir=./data/chat-uploads

# 后台「文件模板下载」本地存储根目录（与 LocalChatObjectStorage 相同防穿越规则）
app.admin.template-upload-dir=./data/admin-template-uploads
# 单文件上限（字节），须小于 spring.servlet.multipart.max-file-size
app.admin.template-max-bytes=26214400